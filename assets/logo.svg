  <circle cx="376" cy="256" r="12" fill="#6366f1"/>
  
  <!-- Subtle grid pattern for tech aesthetic -->
  <g opacity="0.1">
    <line x1="120" y1="256" x2="136" y2="256" stroke="#6366f1" stroke-width="2"/>
    <line x1="376" y1="256" x2="392" y2="256" stroke="#6366f1" stroke-width="2"/>
    <line x1="256" y1="120" x2="256" y2="136" stroke="#6366f1" stroke-width="2"/>
    <line x1="256" y1="376" x2="256" y2="392" stroke="#6366f1" stroke-width="2"/>
  </g>
</svg>