<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" fill="none">
  <!-- Open Graph Image Template - 1200x630 for optimal social sharing -->
  
  <!-- Background -->
  <rect width="1200" height="630" fill="#0a0a0a"/>
  
  <!-- Subtle grid pattern -->
  <g opacity="0.05">
    <defs>
      <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
        <path d="M 40 0 L 0 0 0 40" fill="none" stroke="#6366f1" stroke-width="0.5"/>
      </pattern>
    </defs>
    <rect width="1200" height="630" fill="url(#grid)"/>
  </g>
  
  <!-- Accent border -->
  <rect x="20" y="20" width="1160" height="590" rx="20" stroke="#6366f1" stroke-width="4" fill="none"/>
  
  <!-- Logo mark -->
  <g transform="translate(100, 165)">
    <rect x="0" y="0" width="300" height="300" rx="40" fill="#0a0a0a" stroke="#6366f1" stroke-width="6"/>
    <path d="M70 110c0-22 18-40 40-40h80c22 0 40 18 40 40v40c0 22-18 40-40 40h-80c-22 0-40 18-40 40v40c0 22 18 40 40 40h80c22 0 40-18 40-40" 
          stroke="#6366f1" 
          stroke-width="24" 
          stroke-linecap="round" 
          fill="none"/>
    <line x1="230" y1="70" x2="70" y2="230" 
          stroke="#f59e0b" 
          stroke-width="12" 
          stroke-linecap="round"/>
  </g>
  
  <!-- Main text content -->
  <text x="480" y="280" font-family="system-ui, -apple-system, sans-serif" font-size="72" font-weight="700" fill="#ffffff">
    sidewayz8
  </text>
  <text x="480" y="360" font-family="system-ui, -apple-system, sans-serif" font-size="72" font-weight="700" fill="#6366f1">
    solutions
  </text>
  
  <!-- Tagline -->
  <text x="480" y="440" font-family="system-ui, -apple-system, sans-serif" font-size="32" font-weight="400" fill="#9ca3af">
    Strategic Growth Solutions for Modern Brands
  </text>
  
  <!-- URL -->
  <text x="600" y="560" font-family="system-ui, -apple-system, sans-serif" font-size="24" font-weight="500" fill="#6366f1" text-anchor="middle">
    sidewayz8solutions.com
  </text>
  
  <!-- Accent elements -->
  <circle cx="1100" cy="530" r="8" fill="#6366f1"/>
  <circle cx="1140" cy="530" r="6" fill="#f59e0b"/>
</svg>